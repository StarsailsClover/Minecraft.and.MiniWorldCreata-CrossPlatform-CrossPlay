name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Python 核心引擎测试 ──
  core-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd mnmcp-core
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd mnmcp-core
          pytest -v --tb=short

      - name: Code quality
        run: |
          cd mnmcp-core
          ruff check src/ tests/ || true
          black --check src/ tests/ || true

  # ── Flutter 客户端检查 ──
  flutter-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Check shared package
        run: |
          cd mnmcp-shared
          flutter pub get
          flutter analyze

      - name: Check personal
        run: |
          cd mnmcp-personal
          flutter pub get
          flutter analyze

      - name: Check streamer
        run: |
          cd mnmcp-streamer
          flutter pub get
          flutter analyze

      - name: Check server
        run: |
          cd mnmcp-server
          flutter pub get
          flutter analyze

  # ── 大文件检查 ──
  size-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for large files
        run: |
          LARGE=$(find . -type f -size +50M -not -path "./.git/*")
          if [ -n "$LARGE" ]; then
            echo "::error::Large files (>50MB) found:"
            echo "$LARGE"
            exit 1
          fi
          echo "No large files found"
