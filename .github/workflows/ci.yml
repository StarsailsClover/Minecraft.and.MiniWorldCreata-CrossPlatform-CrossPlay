name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Check file sizes
      run: |
        # 检查是否有超过100MB的文件
        find . -type f -size +100M -not -path "./.git/*" -exec ls -lh {} \; | awk '{ print $9 ": " $5 }'
        
        # 如果有大文件，报错
        LARGE_FILES=$(find . -type f -size +100M -not -path "./.git/*")
        if [ ! -z "$LARGE_FILES" ]; then
          echo "Error: Large files (>100MB) found:"
          echo "$LARGE_FILES"
          echo "Please move large files to external directory (MnMCPResources/)"
          exit 1
        fi
    
    - name: Check component manifest
      run: |
        if [ ! -f "COMPONENT_MANIFEST.json" ]; then
          echo "Error: COMPONENT_MANIFEST.json not found"
          exit 1
        fi
        echo "✓ Component manifest exists"
    
    - name: Check path resolver
      run: |
        if [ ! -f "path_resolver.py" ]; then
          echo "Error: path_resolver.py not found"
          exit 1
        fi
        echo "✓ Path resolver exists"
    
    - name: Code quality check - flake8
      run: |
        flake8 src/ --max-line-length=120 --extend-ignore=E203,W503,E501 || true
      continue-on-error: true
    
    - name: Code format check - black
      run: |
        black --check --diff src/ || true
      continue-on-error: true
    
    - name: Validate Python syntax
      run: |
        python -m py_compile path_resolver.py
        find src/ -name "*.py" -exec python -m py_compile {} \;
        echo "✓ Python syntax valid"
    
    - name: Check documentation
      run: |
        for file in README.md PROJECT_OVERVIEW.md QUICK_START.md; do
          if [ ! -f "$file" ]; then
            echo "Warning: $file not found"
          fi
        done
        echo "✓ Documentation check complete"
    
    - name: Type checking
      run: |
        pip install mypy
        mypy src/ --ignore-missing-imports || true
      continue-on-error: true