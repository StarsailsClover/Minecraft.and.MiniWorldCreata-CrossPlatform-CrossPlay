name: mnmcp_server
description: MnMCP Server - Public server for cross-platform multiplayer
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 共享组件
  mnmcp_shared:
    path: ../mnmcp-shared

  # 服务器
  shelf: ^1.4.1
  shelf_web_socket: ^1.0.4
  shelf_router: ^1.1.4

  # 存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI 增强
  flutter_screenutil: ^5.9.0
  flutter_animate: ^4.3.0
  fl_chart: ^0.66.0

  # 平台
  system_tray: ^2.0.3

  # 工具
  crypto: ^3.0.3
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
